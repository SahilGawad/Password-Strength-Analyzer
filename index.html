<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Analyzer</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Password Strength Analyzer</h2>

    <input 
      type="password" 
      id="password" 
      placeholder="Enter Password"
      onkeyup="checkPassword()"
    >

    <div class="strength-box">
      <div class="strength-bar" id="strengthBar"></div>
    </div>

    <div class="message" id="message"></div>

    <ul id="suggestions"></ul>
  </div>

  <script>
    function checkPassword() {

      let password = document.getElementById("password").value;

      let strengthBar = document.getElementById("strengthBar");
      let message = document.getElementById("message");
      let suggestions = document.getElementById("suggestions");

      let score = 0;
      let tips = [];

      // Length Check
      if(password.length >= 8){
        score++;
      } else {
        tips.push("Use at least 8 characters");
      }

      // Uppercase Check
      if(/[A-Z]/.test(password)){
        score++;
      } else {
        tips.push("Add uppercase letters");
      }

      // Lowercase Check
      if(/[a-z]/.test(password)){
        score++;
      } else {
        tips.push("Add lowercase letters");
      }

      // Number Check
      if(/[0-9]/.test(password)){
        score++;
      } else {
        tips.push("Add numbers");
      }

      // Special Character Check
      if(/[!@#$%^&*]/.test(password)){
        score++;
      } else {
        tips.push("Add special characters");
      }

      // Suggestions
      suggestions.innerHTML = "";

      tips.forEach(tip => {
        suggestions.innerHTML += `<li>${tip}</li>`;
      });

      // Password Strength
      if(score <= 2){
        strengthBar.style.width = "33%";
        strengthBar.style.background = "red";

        message.innerHTML = "Weak Password";
        message.style.color = "red";
      }

      else if(score <= 4){
        strengthBar.style.width = "66%";
        strengthBar.style.background = "orange";

        message.innerHTML = "Medium Password";
        message.style.color = "orange";
      }

      else{
        strengthBar.style.width = "100%";
        strengthBar.style.background = "green";

        message.innerHTML = "Strong Password";
        message.style.color = "green";
      }
    }
  </script>

</body>
</html>
